<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anoushka Codes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, Helvetica, sans-serif;
        }

        .hero{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            color:white;
            text-align:center;
            padding:80px 20px;
            margin-bottom:50px;
        }

        .hero h1{
            font-size:3rem;
            font-weight:bold;
        }

        .hero p{
            font-size:1.2rem;
        }

        .card{
            border:none;
            border-radius:18px;
            overflow:hidden;
            transition:0.3s;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        .card:hover{
            transform:translateY(-8px);
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        .project-image{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .download-btn{
            width:100%;
        }

        footer{
            background:#212529;
            color:white;
            text-align:center;
            padding:25px;
            margin-top:60px;
        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            🚀 Anoushka Codes
        </a>

    </div>

</nav>

<section class="hero">

    <div class="container">

        <h1>My Software Projects</h1>

        <p>
            Download my applications and explore my work.
        </p>

    </div>

</section>

<div class="container">

    <div class="row g-4">

        {% for i in pr %}

        <div class="col-lg-4 col-md-6">

            <div class="card h-100">

                {% if i.Image %}

                    <img src="{{ i.Image.url }}" class="project-image">

                {% else %}

                    <img src="https://via.placeholder.com/600x300?text=No+Image" class="project-image">

                {% endif %}

                <div class="card-body">

                    <h4 class="card-title fw-bold">
                        {{ i.Name }}
                    </h4>

                    <p class="text-muted">
                        Project ID : {{ i.FileID }}
                    </p>

                </div>

                <div class="card-footer bg-white border-0">

                    <a href="{{ i.File.url }}"
                       class="btn btn-primary download-btn"
                       download>

                        ⬇ Download

                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<footer>

    <h5>Anoushka Codes</h5>

    <p>Built with Django • Bootstrap • Render</p>

</footer>

</body>
</html>
